<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>麥積山石窟互動筆記</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b0805;color:#fafaf9;font-family:system-ui,-apple-system,"Microsoft JhengHei",serif}
button,input,textarea{font:inherit} header{height:54px;display:flex;align-items:center;gap:10px;padding:8px 12px;background:#1b130b;border-bottom:1px solid #7c3f16;box-sizing:border-box}
h1{font-size:18px;margin:0;color:#f59e0b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.actions a,.actions button{border:1px solid #9a6b42;color:#fde68a;background:#2b1b10;border-radius:999px;padding:8px 11px;font-weight:900;text-decoration:none}
#viewer{position:absolute;inset:54px 0 0;overflow:hidden;background:#050403;touch-action:none;contain:layout paint style} #stage{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;backface-visibility:hidden}
#wrap{position:relative;display:inline-block;background:#1c1917;border:1px solid #854d0e;contain:layout paint} #map{display:block;height:100vh;width:auto;max-width:none;pointer-events:none;user-select:none;-webkit-user-drag:none}
#numbers,#spots{position:absolute;inset:0;pointer-events:none}.num{display:none}.spot{position:absolute;transform:translate(-50%,-50%) translateZ(0);min-width:28px;height:23px;padding:2px 5px;border-radius:6px;border:1px solid #fff7ed;background:#f97316;color:#1c1917;font-size:10px;font-weight:900;line-height:17px;box-shadow:0 2px 5px rgba(0,0,0,.45);pointer-events:auto;z-index:8;touch-action:manipulation}
.modal{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:12px}.card{width:min(760px,96vw);max-height:90vh;overflow:auto;background:#1c1917;border:2px solid #f97316;border-radius:22px}
.head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #57534e;position:sticky;top:0;background:#1c1917;z-index:2}.head h2{font-size:20px;font-weight:900;color:#fdba74;margin:0}.x{margin-left:auto;border:0;background:transparent;color:#fde68a;font-size:30px}
.body{padding:16px;display:flex;flex-direction:column;gap:14px}.box{background:#fafaf9;color:#292524;border-radius:14px;padding:12px;white-space:pre-wrap;line-height:1.65}.muted{color:#a8a29e;font-size:13px}
input,textarea{width:100%;box-sizing:border-box;background:#0c0a09;color:#fafaf9;border:1px solid #57534e;border-radius:13px;padding:12px}.main{border:0;border-radius:14px;padding:13px 16px;font-weight:900;background:#f97316;color:#1c1917}.secondary{border:0;border-radius:14px;padding:13px 16px;font-weight:900;background:#44403c;color:#fde68a}
.photo{background:#fafaf9;color:#292524;border-radius:14px;overflow:hidden;margin:0 0 12px}.photo img{display:block;width:100%;max-height:72vh;height:auto;object-fit:contain;background:#111}.photo figcaption{padding:10px 12px;line-height:1.5}#addNote{position:fixed;right:16px;bottom:16px;z-index:20;border:0;border-radius:999px;padding:15px 19px;font-weight:900;background:#f97316;color:#1c1917;box-shadow:0 8px 20px rgba(0,0,0,.55)}
@media(max-width:640px){header{height:50px}#viewer{inset:50px 0 0}#map{height:96vh}.spot{min-width:26px;height:22px;font-size:10px;line-height:16px;padding:2px 5px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.45)}}
</style>
</head>
<body>
<header><span>⛰️</span><h1>麥積山石窟互動筆記</h1><div class="actions"><a href="./index.html">莫高窟</a><button id="zoomOut">－</button><button id="zoomIn">＋</button><button id="resetView">重設</button></div></header>
<main id="viewer"><div id="stage"><div id="wrap"><img id="map" src="./data/maijishan-guide-clean.webp" alt="麥積山石窟導覽圖"><div id="numbers"></div><div id="spots"></div></div></div></main>
<button id="addNote">＋新增筆記</button>
<section id="modal" class="modal"><div class="card"><div class="head"><h2 id="modalTitle"></h2><button id="closeModal" class="x">×</button></div><div class="body"><div id="info" class="box"></div><div><div class="muted">文字筆記</div><div id="textView" class="box"></div></div><div><div class="muted">照片</div><div id="photos"></div></div><button id="editCave" class="main">新增／修改補充</button><button id="closeModal2" class="secondary">關閉</button></div></div></section>
<section id="panel" class="modal"><div class="card"><div class="head"><h2>補充麥積山洞窟資料</h2><button id="closePanel" class="x">×</button></div><div class="body"><label>洞窟號</label><input id="caveInput" inputmode="numeric" placeholder="例如 115"><label>補充文字</label><textarea id="textInput" rows="5"></textarea><div class="muted">要新增橘色標籤時，先把地圖移到想放的位置，再按下面按鈕。</div><button id="placeLabel" class="secondary">把橘色標籤放在畫面中心</button><input id="labelX" type="hidden"><input id="labelY" type="hidden"><button id="saveText" class="main">儲存補充文字</button><label>照片備註</label><textarea id="captionInput" rows="3"></textarea><input id="fileInput" type="file" accept="image/*"><button id="uploadBtn" class="main">新增補充照片（一次 1 張）</button><button id="clearOld" class="secondary">清除舊暫存</button><p id="status" class="muted"></p></div></div></section>
<script src="./maijishan-app.js?v=12"></script>
<script src="./maijishan-family-patch.js?v=2"></script>
</body></html>
