<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-label="麥積山石窟乾淨底圖，無洞窟號與橘色標籤">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#243447"/>
      <stop offset="0.46" stop-color="#4e5f68"/>
      <stop offset="1" stop-color="#b58b5b"/>
    </linearGradient>
    <linearGradient id="cliff" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b86f2d"/>
      <stop offset="0.38" stop-color="#8e4e20"/>
      <stop offset="0.68" stop-color="#6b3619"/>
      <stop offset="1" stop-color="#3b2115"/>
    </linearGradient>
    <linearGradient id="face" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#d08a3d"/>
      <stop offset="0.45" stop-color="#9b5526"/>
      <stop offset="1" stop-color="#432416"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="5" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
    <pattern id="smallCaves" width="120" height="90" patternUnits="userSpaceOnUse">
      <ellipse cx="38" cy="28" rx="14" ry="10" fill="#21130c" opacity="0.48"/>
      <ellipse cx="82" cy="58" rx="11" ry="8" fill="#28160e" opacity="0.38"/>
    </pattern>
  </defs>

